name: Frontend E2E

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Vercel preview URL
        id: preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            deployment_id=$(gh api "/repos/${REPO}/deployments?sha=${SHA}&per_page=100" \
              --jq '[.[] | select(.environment | test("preview"; "i"))] | .[0].id // empty')
            if [ -n "${deployment_id:-}" ]; then
              url=$(gh api "/repos/${REPO}/deployments/${deployment_id}/statuses" \
                --jq '[.[] | select(.state == "success")] | .[0].environment_url // .[0].target_url // empty')
              if [ -n "${url:-}" ]; then
                echo "Resolved preview URL: ${url}"
                echo "url=${url}" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            echo "attempt ${i}/30: preview not ready yet"
            sleep 10
          done
          echo "Timed out waiting for Vercel preview deployment." >&2
          exit 1

      - name: Wait for preview 200 (with protection bypass)
        env:
          URL: ${{ steps.preview.outputs.url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "x-vercel-protection-bypass: ${BYPASS}" \
              -H "x-vercel-set-bypass-cookie: true" \
              "${URL}")
            echo "attempt ${i}/30: HTTP ${code}"
            if [ "${code}" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Preview never returned 200." >&2
          exit 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright against preview
        # Explicit spec list — the auth.spec.ts loop needs a working
        # backend and runs in frontend-auth-e2e.yml against a local stack.
        # Listing specs here avoids picking it up against the unreachable
        # preview API.
        run: pnpm exec playwright test e2e/smoke.spec.ts e2e/dashboard.spec.ts e2e/map.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
