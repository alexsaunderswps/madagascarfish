name: CI

on:
  push:
    branches: [main, "gate/*", "feat/*", "fix/*", "docs/*"]
  pull_request:
    branches: [main]

env:
  DJANGO_SETTINGS_MODULE: config.settings.test
  DATABASE_URL: postgis://postgres:postgres@localhost:5432/test_mffcp
  REDIS_URL: redis://localhost:6379/0
  # CI-only dummy value. Real secret is set per-environment in deploy configs.
  DJANGO_SECRET_KEY: ci-only-not-a-real-secret

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install Python dependencies
        run: |
          pip install -r ../requirements.txt
          pip install "GDAL==$(gdal-config --version)"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy --config-file ../pyproject.toml .

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: test_mffcp
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install Python dependencies
        run: |
          pip install -r ../requirements.txt
          pip install "GDAL==$(gdal-config --version)"

      - name: Run tests
        run: pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
